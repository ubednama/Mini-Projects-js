name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: JS syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: node --check on every JS file
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' f; do
            if ! node --check "$f"; then
              echo "::error file=$f::syntax error"
              fail=1
            fi
          done < <(find . \
            -type f -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './.vercel/*' \
            -not -path './.git/*' \
            -print0)
          exit $fail
