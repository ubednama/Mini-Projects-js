<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator</title>
    <meta name="description" content="Generate QR codes instantly" />
    <meta property="og:title" content="QR Code Generator | Mini Projects JS" />
    <meta property="og:description" content="Generate QR codes instantly" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="../og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="game-body">
    <!-- Back Button -->
    <a href="../index.html" class="top-right-back">← Back</a>

    <main class="center-container">
      <header class="app-header">
        <h1 class="app-title">QR Code Generator</h1>
        <p class="app-desc">Generate QR codes for text, URLs, or any data.</p>
      </header>

      <div class="qr-app-container">
        <div class="input-section">
          <label for="input" class="visually-hidden">Text or URL to encode</label>
          <input
            type="text"
            id="input"
            placeholder="Enter text or URL..."
            autocomplete="off"
            aria-label="Text or URL to encode"
          />
          <button id="qr-code" class="btn-primary">Generate QR Code</button>
        </div>

        <div class="output-section">
          <div id="loading" class="spinner hide"></div>
          <div class="qr-result">
            <img id="code-img" src="" alt="Generated QR Code" />
            <div class="qr-actions">
              <button id="copy-text" class="btn-secondary hide" type="button">Copy text</button>
              <button id="download-qr" class="btn-primary hide" type="button">Download</button>
            </div>
          </div>
        </div>
      </div>

      <div id="toast-container" class="toast-container"></div>

      <!-- Footer -->
      <footer class="footer">
        Built with ❤️ by
        <a href="https://github.com/ubednama" target="_blank">ubednama</a>
      </footer>
    </main>

    <script src="../terminal-utils.js"></script>
    <script src="script.js"></script>
  </body>
</html>
