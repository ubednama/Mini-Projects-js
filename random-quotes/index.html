<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Quotes</title>
    <meta name="description" content="Random quotes fetched live from a public API" />
    <meta property="og:title" content="Random Quotes | Mini Projects JS" />
    <meta property="og:description" content="Random quotes fetched live from a public API" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="../og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="game-body">
    <!-- Back Button -->
    <a href="../" class="top-right-back">← Back</a>

    <main class="center-container">
      <!-- Header -->
      <header class="app-header">
        <h1 class="app-title">Random Quotes</h1>
        <p class="app-desc">Fresh quote on every click — powered by the DummyJSON API.</p>
      </header>

      <div class="quotes-app-container">
        <div id="quote-container" class="quote-box">
          <p id="quote">Loading...</p>
          <p id="author"></p>
        </div>

        <button id="new-quote-btn" class="btn-primary">Get New Quote</button>
      </div>

      <!-- Error Toast Container -->
      <div id="toast-container" class="toast-container"></div>

      <!-- Footer -->
      <footer class="footer">
        Built with ❤️ by
        <a href="https://github.com/ubednama" target="_blank">ubednama</a>
      </footer>
    </main>

    <script src="../terminal-utils.js"></script>
    <script src="quotes.js"></script>
  </body>
</html>
